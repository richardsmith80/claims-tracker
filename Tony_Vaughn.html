<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header-left h1{font-size:15px;font-weight:700;color:#fff}.header-left p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;font-family:'DM Mono',monospace}
.header-right{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.tabbar{background:var(--navy);display:flex;padding:0 24px;border-bottom:2px solid var(--teal);overflow-x:auto}
.tab{padding:9px 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.85)}.tab.on{color:var(--teal2);border-bottom-color:var(--teal2)}
.month-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.month-bar label{font-size:11px;font-weight:600;color:var(--muted);margin-right:4px}
.mbtn{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.mbtn:hover{border-color:var(--teal);color:var(--teal)}.mbtn.on{background:var(--teal);border-color:var(--teal);color:#fff}
.mbtn.ytd.on{background:var(--gold);border-color:var(--gold);color:#fff}
.content{padding:14px 24px;max-width:1400px;margin:0 auto}
.panel{display:none}.panel.on{display:block}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal)}
.stat-card.gold::before{background:var(--gold)}.stat-card.green::before{background:var(--green)}.stat-card.navy::before{background:var(--navy)}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:24px;font-weight:700;color:var(--navy);line-height:1.1;margin:4px 0 2px;font-family:'DM Mono',monospace}
.stat-sub{font-size:10px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-title{padding:9px 14px;font-size:12px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);background:var(--stripe)}
table{width:100%;border-collapse:collapse}
th{padding:7px 10px;text-align:center;font-size:10px;font-weight:700;color:#fff;background:var(--navy);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
th.left{text-align:left}
td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);font-size:12px}
td.left{text-align:left;font-weight:600}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--stripe)}
tr.total-row td{background:var(--navy)!important;color:#fff!important;font-weight:700}
.num{font-family:'DM Mono',monospace}.dash{color:var(--border)}
.badge-met{background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-miss{background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-warn{background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-ref{background:var(--stripe);color:var(--muted);padding:2px 8px;border-radius:12px;font-size:11px}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:3px;background:var(--teal)}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.perf-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.perf-head{padding:9px 12px;background:var(--navy);color:#fff;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.perf-stats{display:flex;border-bottom:1px solid var(--border)}
.ps{flex:1;padding:6px 8px;text-align:center;border-right:1px solid var(--border)}
.ps:last-child{border-right:none}
.ps-val{font-size:15px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}
.ps-lbl{font-size:10px;color:var(--muted);line-height:1.4}
.perf-body{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perf-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.perf-section ul{padding-left:14px}.perf-section li{font-size:11px;line-height:1.6}

#lock{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px}
#lock.hidden{display:none}
.lock-box{background:#1a3560;border-radius:14px;padding:40px 48px;text-align:center;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lock-icon{font-size:36px;margin-bottom:12px}
.lock-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.lock-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:24px;font-family:'DM Mono',monospace}
.lock-input{width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;text-align:center;letter-spacing:.1em;outline:none;transition:border .2s}
.lock-input:focus{border-color:rgba(255,255,255,.4)}
.lock-btn{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;color:#fff}
.lock-btn:hover{filter:brightness(1.15)}
.lock-err{font-size:12px;color:#e57373;margin-top:8px;min-height:16px}
.lock-footer{font-size:11px;color:rgba(255,255,255,.3);margin-top:24px;text-align:center}
#app{display:none}#app.visible{display:block}
.signout{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.2)}

.lock-btn{background:#c9922a}
.tab.on{color:#c9922a!important;border-bottom-color:#c9922a!important}
.mbtn.on{background:#c9922a!important;border-color:#c9922a!important}
.stat-card::before{background:#c9922a}
.prog-fill{background:#c9922a}
</style></head><body>

<div id="lock">

  "Thomas Banks": {

const mT=(mo,n)=>(DATA[mo]?.modified[n]||[]).reduce((a,b)=>a+b,0);
const ytdT=n=>MONTHS.reduce((s,m)=>s+mT(m,n),0);
const aw=(mo,n)=>(DATA[mo]?.modified[n]||[]).filter(v=>v>0).length;
const perfA=n=>FIXED_AVG[n]?(FIXED_AVG[n].total/FIXED_AVG[n].days).toFixed(1):(()=>{const w=MONTHS.reduce((s,m)=>s+aw(m,n),0),t=ytdT(n);return w>0?(t/(w*5)).toFixed(1):"—"})();
const perfL=n=>FIXED_AVG[n]?`since ${FIXED_AVG[n].label}`:"active days";
const avgM=(mo,n)=>{const w=aw(mo,n),t=mT(mo,n);return w>0?(t/(w*5)).toFixed(1):"—"};

let curMo="Apr 2026",curTab="summary",CH={};

function unlock(){
  if(document.getElementById('pw').value===PW){
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    go('summary');
  }else{
    document.getElementById('err').textContent="Incorrect password. Please try again.";
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
function lockOut(){
  document.getElementById('app').classList.remove('visible');
  document.getElementById('lock').classList.remove('hidden');
  document.getElementById('pw').value='';
  document.getElementById('err').textContent='';
  Object.values(CH).forEach(c=>c.destroy());CH={};
}

document.addEventListener('click',e=>{

function go(t){

function rSoloSum(name){

  const pa=perfA(name),pl=perfL(name),p=PERF_NOTES[name];
  const mo_rows=curMo==='YTD'?MONTHS.map(m=>{const v=mT(m,name);return v>0?`<tr><td class="left">${m}</td><td class="num" style="font-size:14px;font-weight:700">${v.toLocaleString()}</td><td class="num">${avgM(m,name)}</td></tr>`:''}).join(''):'';
  document.getElementById('p-summary').innerHTML=`<div class="stat-row"><div class="stat-card"><div class="stat-label">${lbl} Total</div><div class="stat-val num">${t.toLocaleString()}</div><div class="stat-sub">claims modified</div></div><div class="stat-card gold"><div class="stat-label">Avg / Day</div><div class="stat-val num">${pa}</div><div class="stat-sub">${pl}</div></div><div class="stat-card green"><div class="stat-label">Best Month</div><div class="stat-val" style="font-size:15px">${best}</div><div class="stat-sub">${mT(best,name).toLocaleString()} claims</div></div><div class="stat-card navy"><div class="stat-label">YTD Total</div><div class="stat-val num">${ytdT(name).toLocaleString()}</div><div class="stat-sub">all tracked months</div></div></div>${curMo==='YTD'?`<div class="card"><div class="card-title">Monthly Breakdown</div><table><thead><tr><th class="left">Month</th><th>Total</th><th>Avg/Day</th></tr></thead><tbody>${mo_rows}</tbody></table></div>`:''}<div class="card"><div class="card-title">Performance Notes</div><div style="padding:14px"><div style="margin-bottom:12px"><h4 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">✅ Strengths</h4><ul style="padding-left:16px">${p.strengths.map(x=>`<li style="font-size:12px;line-height:1.7">${x}</li>`).join('')}</ul></div><div style="margin-bottom:12px"><h4 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">⚠️ Development Areas</h4><ul style="padding-left:16px">${p.development.map(x=>`<li style="font-size:12px;line-height:1.7">${x}</li>`).join('')}</ul></div><div><h4 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">🎯 Goals / Next Steps</h4><ul style="padding-left:16px">${p.goals.map(x=>`<li style="font-size:12px;line-height:1.7">${x}</li>`).join('')}</ul></div></div></div>`;
}

function rSoloWeek(name){
  const mos=curMo==='YTD'?MONTHS:[curMo];
  document.getElementById('p-weekly').innerHTML=mos.map(mo=>{const d=DATA[mo];const v=d.modified[name]||[];const t=v.reduce((a,b)=>a+b,0);if(t===0)return'';return`<div class="card" style="margin-bottom:14px"><div class="card-title">${mo}</div><table><thead><tr>${d.weeks.map(w=>`<th>${w}</th>`).join('')}<th>Total</th><th>Avg/Day</th></tr></thead><tbody><tr>${v.map(x=>`<td class="num" style="font-size:14px;font-weight:600">${fmt(x)}</td>`).join('')}<td class="num" style="font-size:15px;font-weight:700;color:var(--navy)">${t.toLocaleString()}</td><td class="num">${avgM(mo,name)}</td></tr></tbody></table></div>`}).join('');
}

function rSoloThresh(name){
  const periods=[{l:"Jan 18-31",mo:"Jan 2026",wks:[3,4],base:true},{l:"Feb 1-14",mo:"Feb 2026",wks:[0,1]},{l:"Feb 15-28",mo:"Feb 2026",wks:[2,3]},{l:"Mar 1-14",mo:"Mar 2026",wks:[0,1]},{l:"Mar 15-28",mo:"Mar 2026",wks:[2,3]},{l:"Mar 29-Apr 11",mo:"Mar 2026",wks:[4],apr:[0,1]},{l:"Apr 12-18",mo:"Apr 2026",wks:[2]}];
  const pT=(p)=>{let t=p.wks.reduce((s,wi)=>s+(DATA[p.mo].modified[name]?.[wi]||0),0);if(p.apr)t+=p.apr.reduce((s,wi)=>s+(DATA["Apr 2026"].modified[name]?.[wi]||0),0);return t};
  const track=periods.filter(p=>!p.base);
  let prev=pT(periods[0]),met=0,tot=0;
  const rows=track.map(p=>{const cur=pT(p);if(prev===0){prev=cur;return`<tr><td class="left">${p.l}</td><td class="num">${cur||'—'}</td><td>—</td><td><span class="badge-ref">est. baseline</span></td></tr>`}tot++;const need=Math.round(prev*.9),short=need-cur,ratio=cur/prev;prev=cur;const ok=ratio>=.9;if(ok)met++;return`<tr><td class="left">${p.l}</td><td class="num" style="font-size:14px;font-weight:700">${cur.toLocaleString()}</td><td class="num">${need}</td><td>${ok?`<span class="badge-met">✅ Met</span>`:`<span class="badge-miss">❌ Short by ${short}</span>`}</td></tr>`}).join('');
  const rate=tot>0?Math.round(met/tot*100):0;
  document.getElementById('p-thresh').innerHTML=`<div class="stat-row" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-label">Periods Tracked</div><div class="stat-val num">${tot}</div></div><div class="stat-card green"><div class="stat-label">Periods Met</div><div class="stat-val num">${met}</div></div><div class="stat-card ${rate===100?'green':rate>=50?'gold':'navy'}"><div class="stat-label">Pass Rate</div><div class="stat-val num">${rate}%</div></div></div><div class="card"><div style="padding:8px 14px;font-size:12px;color:var(--muted);background:var(--stripe);border-bottom:1px solid var(--border)">2-week periods vs prior period. 90%+ = Met. Jan 18–31 is your baseline.</div><div class="card-title">Bi-Weekly 90% Threshold</div><table><thead><tr><th class="left">Period</th><th>Your Total</th><th>Needed (90%)</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rSoloChart(name){
  Object.values(CH).forEach(c=>c.destroy());CH={};
  const cl=ACCENT;
  document.getElementById('p-charts').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px"><div class="card"><div class="card-title">Monthly totals</div><div style="padding:14px;height:260px"><canvas id="c1"></canvas></div></div><div class="card"><div class="card-title">Weekly trend (all time)</div><div style="padding:14px;height:260px"><canvas id="c2"></canvas></div></div></div>`;
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}};
  setTimeout(()=>{
    CH.c1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:MONTHS,datasets:[{backgroundColor:cl+'cc',data:MONTHS.map(m=>mT(m,name))}]},options:o});
    const allWks=[],allVals=[];
    MONTHS.forEach(mo=>{DATA[mo].weeks.forEach((w,wi)=>{allWks.push(w);allVals.push(DATA[mo].modified[name]?.[wi]||0)})});
    CH.c2=new Chart(document.getElementById('c2'),{type:'line',data:{labels:allWks,datasets:[{borderColor:cl,backgroundColor:cl+'22',data:allVals,tension:.3,pointRadius:3,fill:true}]},options:o});
  },80);
}

</script></body></html>
