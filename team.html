<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claims Tracker — Mann-Grandstaff VAMC FY2026</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--navy:#0f2444;--navy2:#1a3560;--teal:#1a7fa8;--teal2:#22a8db;--gold:#c9922a;--green:#1a7a4a;--green-bg:#e8f7ee;--red:#c0392b;--red-bg:#fdecea;--amber:#d97706;--amber-bg:#fef3c7;--bg:#f0f4f9;--card:#fff;--border:#dde3ed;--text:#1a2640;--muted:#6b7a99;--stripe:#f7f9fc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header-left h1{font-size:15px;font-weight:700;color:#fff}.header-left p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;font-family:'DM Mono',monospace}
.header-right{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.tabbar{background:var(--navy);display:flex;padding:0 24px;border-bottom:2px solid var(--teal);overflow-x:auto}
.tab{padding:9px 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.85)}.tab.on{color:var(--teal2);border-bottom-color:var(--teal2)}
.month-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.month-bar label{font-size:11px;font-weight:600;color:var(--muted);margin-right:4px}
.mbtn{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.mbtn:hover{border-color:var(--teal);color:var(--teal)}.mbtn.on{background:var(--teal);border-color:var(--teal);color:#fff}
.mbtn.ytd.on{background:var(--gold);border-color:var(--gold);color:#fff}
.content{padding:14px 24px;max-width:1400px;margin:0 auto}
.panel{display:none}.panel.on{display:block}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal)}
.stat-card.gold::before{background:var(--gold)}.stat-card.green::before{background:var(--green)}.stat-card.navy::before{background:var(--navy)}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:24px;font-weight:700;color:var(--navy);line-height:1.1;margin:4px 0 2px;font-family:'DM Mono',monospace}
.stat-sub{font-size:10px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-title{padding:9px 14px;font-size:12px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);background:var(--stripe)}
table{width:100%;border-collapse:collapse}
th{padding:7px 10px;text-align:center;font-size:10px;font-weight:700;color:#fff;background:var(--navy);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
th.left{text-align:left}
td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);font-size:12px}
td.left{text-align:left;font-weight:600}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--stripe)}
tr.total-row td{background:var(--navy)!important;color:#fff!important;font-weight:700}
.num{font-family:'DM Mono',monospace}.dash{color:var(--border)}
.badge-met{background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-miss{background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-warn{background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-ref{background:var(--stripe);color:var(--muted);padding:2px 8px;border-radius:12px;font-size:11px}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:3px;background:var(--teal)}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.perf-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.perf-head{padding:9px 12px;background:var(--navy);color:#fff;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.perf-stats{display:flex;border-bottom:1px solid var(--border)}
.ps{flex:1;padding:6px 8px;text-align:center;border-right:1px solid var(--border)}
.ps:last-child{border-right:none}
.ps-val{font-size:15px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}
.ps-lbl{font-size:10px;color:var(--muted);line-height:1.4}
.perf-body{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perf-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.perf-section ul{padding-left:14px}.perf-section li{font-size:11px;line-height:1.6}
</style></head><body>

const mT=(mo,n)=>(DATA[mo]?.modified[n]||[]).reduce((a,b)=>a+b,0);
const ytdT=n=>MONTHS.reduce((s,m)=>s+mT(m,n),0);
const aw=(mo,n)=>(DATA[mo]?.modified[n]||[]).filter(v=>v>0).length;
const ytdAW=n=>MONTHS.reduce((s,m)=>s+aw(m,n),0);
const avgM=(mo,n)=>{const w=aw(mo,n),t=mT(mo,n);return w>0?(t/(w*5)).toFixed(1):"—"};
const perfA=n=>FIXED_AVG[n]?(FIXED_AVG[n].total/FIXED_AVG[n].days).toFixed(1):(()=>{const w=ytdAW(n),t=ytdT(n);return w>0?(t/(w*5)).toFixed(1):"—"})();
const perfL=n=>FIXED_AVG[n]?`since ${FIXED_AVG[n].label}`:"active days";
const ytdA=n=>{const w=ytdAW(n),t=ytdT(n);return w>0?(t/(w*5)).toFixed(1):"—"};
const fmt=n=>n>0?n.toLocaleString():'<span class="dash">—</span>';
let curMo="Apr 2026",curTab="summary",CH={};

document.addEventListener('click',e=>{
  if(e.target.dataset.t){const t=e.target.dataset.t;curTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t===t));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));const el=document.getElementById('p-'+t);if(el){el.classList.add('on');go(t)}}

});

function go(t){
  if(t==='summary')rSum();
  else if(t==='weekly')rWeek();
  else if(t==='lb')rLB();
  else if(t==='thresh')rThresh();
  else if(t==='charts')rCharts();
  else if(t==='notes')rNotes();
}

function rSum(){
  const mos=curMo==='YTD'?MONTHS:[curMo],lbl=curMo==='YTD'?'YTD FY2026':curMo;
  const gT=n=>mos.reduce((s,m)=>s+mT(m,n),0);

  const moc=curMo==='YTD'?MONTHS.map(m=>`<th>${m}</th>`).join(''):'';
  const rows=CORE.map(n=>{const t=gT(n),w=mos.reduce((s,m)=>s+aw(m,n),0),av=w>0?(t/(w*5)).toFixed(1):"—";return`<tr><td class="left">${n}</td><td class="num">${fmt(t)}</td><td class="num">${av}</td>${curMo==='YTD'?MONTHS.map(m=>`<td class="num">${fmt(mT(m,n))}</td>`).join(''):''}</tr>`}).join('');
  document.getElementById('p-summary').innerHTML=`<div class="stat-row"><div class="stat-card"><div class="stat-label">Team Total (${lbl})</div><div class="stat-val num">${(cT+oT).toLocaleString()}</div><div class="stat-sub">all staff</div></div><div class="stat-card gold"><div class="stat-label">Core Staff</div><div class="stat-val num">${cT.toLocaleString()}</div><div class="stat-sub">${CORE.length} tracked</div></div><div class="stat-card green"><div class="stat-label">Top Producer</div><div class="stat-val" style="font-size:16px">${top.split(' ')[0]}</div><div class="stat-sub">${gT(top).toLocaleString()} claims</div></div><div class="stat-card navy"><div class="stat-label">Other Staff</div><div class="stat-val num">${oT.toLocaleString()}</div><div class="stat-sub">non-core</div></div></div><div class="card"><div class="card-title">Claims Modified — ${lbl}</div><table><thead><tr><th class="left">Staff Member</th><th>Total</th><th>Avg/Day</th>${moc}</tr></thead><tbody>${rows}<tr class="total-row"><td class="left">Grand Total</td><td class="num">${(cT+oT).toLocaleString()}</td><td>—</td>${curMo==='YTD'?MONTHS.map(m=>`<td class="num">${(CORE.reduce((s,n)=>s+mT(m,n),0)+DATA[m].others_m.reduce((a,b)=>a+b,0)).toLocaleString()}</td>`).join(''):''}</tr></tbody></table></div>`;
}

function rWeek(){
  const mos=curMo==='YTD'?MONTHS:[curMo];
  document.getElementById('p-weekly').innerHTML=mos.map(mo=>{const d=DATA[mo];return`<div class="card" style="margin-bottom:14px"><div class="card-title">${mo} — Weekly Breakdown</div><table><thead><tr><th class="left">Staff Member</th>${d.weeks.map(w=>`<th>${w}</th>`).join('')}<th>Total</th><th>Avg/Day</th></tr></thead><tbody>${CORE.map(n=>{const v=d.modified[n]||[];const t=v.reduce((a,b)=>a+b,0);return`<tr><td class="left">${n}</td>${v.map(x=>`<td class="num">${fmt(x)}</td>`).join('')}<td class="num" style="font-weight:700">${fmt(t)}</td><td class="num">${avgM(mo,n)}</td></tr>`}).join('')}<tr><td class="left" style="color:var(--muted);font-style:italic;font-weight:400">Other Staff</td>${d.others_m.map(x=>`<td class="num" style="color:var(--muted)">${fmt(x)}</td>`).join('')}<td class="num" style="color:var(--muted)">${fmt(d.others_m.reduce((a,b)=>a+b,0))}</td><td>—</td></tr><tr class="total-row"><td class="left">Grand Total</td>${d.weeks.map((_,wi)=>`<td class="num">${(CORE.reduce((s,n)=>s+(d.modified[n]?.[wi]||0),0)+d.others_m[wi]).toLocaleString()}</td>`).join('')}<td class="num">${(CORE.reduce((s,n)=>s+mT(mo,n),0)+d.others_m.reduce((a,b)=>a+b,0)).toLocaleString()}</td><td>—</td></tr></tbody></table></div>`}).join('');

function rLB(){

  const s=[...CORE].map(n=>({n,t:gT(n),a:gA(n)})).sort((a,b)=>b.t-a.t);
  const md=['🥇','🥈','🥉'];
  document.getElementById('p-lb').innerHTML=`<div class="card"><div class="card-title">🏆 Leaderboard — ${curMo==='YTD'?'YTD FY2026':curMo}</div><table><thead><tr><th style="width:40px">#</th><th class="left">Staff Member</th><th>Total</th><th>Avg/Day</th><th>Relative</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody>${s.map((e,i)=>`<tr><td style="font-size:15px">${md[i]||i+1}</td><td class="left">${e.n}</td><td class="num" style="font-size:15px;font-weight:700">${e.t>0?e.t.toLocaleString():'—'}</td><td class="num">${e.a}</td><td style="min-width:140px"><div class="prog-bar"><div class="prog-fill" style="width:${s[0].t>0?Math.round(e.t/s[0].t*100):0}%"></div></div></td>${MONTHS.map(m=>`<td class="num">${fmt(mT(m,e.n))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function rThresh(){
  const periods=[{l:"Jan 18-31",mo:"Jan 2026",wks:[3,4],base:true},{l:"Feb 1-14",mo:"Feb 2026",wks:[0,1]},{l:"Feb 15-28",mo:"Feb 2026",wks:[2,3]},{l:"Mar 1-14",mo:"Mar 2026",wks:[0,1]},{l:"Mar 15-28",mo:"Mar 2026",wks:[2,3]},{l:"Mar 29-Apr 11",mo:"Mar 2026",wks:[4],apr:[0,1]},{l:"Apr 12-18",mo:"Apr 2026",wks:[2]}];
  const pT=(p,n)=>{let t=p.wks.reduce((s,wi)=>s+(DATA[p.mo].modified[n]?.[wi]||0),0);if(p.apr)t+=p.apr.reduce((s,wi)=>s+(DATA["Apr 2026"].modified[n]?.[wi]||0),0);return t};
  const track=periods.filter(p=>!p.base);
  const rows=CORE.map(n=>{let prev=pT(periods[0],n),met=0,tot=0;const cells=track.map(p=>{const cur=pT(p,n);if(prev===0){prev=cur;return`<td><span class="badge-ref">${cur>0?cur:'—'}</span></td>`}tot++;const need=Math.round(prev*.9),short=need-cur,ratio=cur/prev;prev=cur;if(ratio>=.9){met++;return`<td><span class="badge-met">✅ ${cur.toLocaleString()}</span><br><span style="font-size:9px;color:var(--green)">needed ${need}</span></td>`}return`<td><span class="badge-miss">❌ ${cur.toLocaleString()}</span><br><span style="font-size:9px;color:var(--red)">short ${short}</span></td>`});const rate=tot>0?Math.round(met/tot*100):null;const rb=rate===null?'<span class="badge-ref">—</span>':rate===100?`<span class="badge-met">${rate}%</span>`:rate>=50?`<span class="badge-warn">${rate}%</span>`:`<span class="badge-miss">${rate}%</span>`;return`<tr><td class="left">${n}</td><td class="num">${pT(periods[0],n)||'—'}</td>${cells.join('')}<td style="font-weight:700">${tot>0?`${met}/${tot}`:'—'}</td><td>${rb}</td></tr>`}).join('');
  document.getElementById('p-thresh').innerHTML=`<div class="card"><div style="padding:8px 14px;font-size:12px;color:var(--muted);background:var(--stripe);border-bottom:1px solid var(--border)">2-week periods vs prior period. 90%+ = Met. Jan 18–31 is the baseline. Policy effective Feb 2026.</div><div class="card-title">⚠️ Bi-Weekly 90% Threshold</div><table><thead><tr><th class="left">Staff Member</th><th>Jan 18-31<br><small>baseline</small></th>${track.map(p=>`<th>${p.l}</th>`).join('')}<th>Met</th><th>Rate</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rCharts(){
  Object.values(CH).forEach(c=>c.destroy());CH={};
  const act=CORE.filter(n=>ytdT(n)>0);
  const cl=['#1a7fa8','#c9922a','#2e7d32','#7b1fa2','#d32f2f','#0288d1','#558b2f'];
  document.getElementById('p-charts').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px"><div class="card"><div class="card-title">📊 Monthly claims by staff</div><div style="padding:14px;height:260px"><canvas id="c1"></canvas></div></div><div class="card"><div class="card-title">📈 Month-over-month trend</div><div style="padding:14px;height:260px"><canvas id="c2"></canvas></div></div></div><div class="card"><div class="card-title">📉 Apr 2026 weekly volume</div><div style="padding:14px;height:220px"><canvas id="c3"></canvas></div></div>`;
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}};
  setTimeout(()=>{
    CH.c1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:MONTHS,datasets:act.map((n,i)=>({label:n,backgroundColor:cl[i]+'cc',data:MONTHS.map(m=>mT(m,n))}))},options:o});
    CH.c2=new Chart(document.getElementById('c2'),{type:'line',data:{labels:MONTHS,datasets:act.map((n,i)=>({label:n,borderColor:cl[i],backgroundColor:cl[i]+'22',data:MONTHS.map(m=>mT(m,n)),tension:.3,pointRadius:3}))},options:o});
    const md=DATA["Apr 2026"],an=CORE.filter(n=>mT("Apr 2026",n)>0);
    CH.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:md.weeks,datasets:an.map((n,i)=>({label:n,backgroundColor:cl[i]+'cc',data:md.modified[n]}))},options:{...o,scales:{x:{...o.scales.x,stacked:true},y:{...o.scales.y,stacked:true}}}});
  },80);
}

function rNotes(){
  document.getElementById('p-notes').innerHTML=`<div class="perf-grid">${CORE.map(n=>{const t=ytdT(n),pa=perfA(n),pl=perfL(n),p=PERF_NOTES[n],best=MONTHS.reduce((b,m)=>mT(m,n)>mT(b,n)?m:b,MONTHS[0]);return`<div class="perf-card"><div class="perf-head"><span>${n}</span><small style="font-size:11px;font-weight:400;opacity:.7">YTD: ${t.toLocaleString()}</small></div><div class="perf-stats"><div class="ps"><div class="ps-val">${t.toLocaleString()}</div><div class="ps-lbl">YTD Total</div></div><div class="ps"><div class="ps-val">${pa}</div><div class="ps-lbl">Avg/Day<br><span style="font-size:9px">${pl}</span></div></div><div class="ps"><div class="ps-val" style="font-size:12px">${best}</div><div class="ps-lbl">Best Month</div></div><div class="ps"><div class="ps-val">${mT(best,n).toLocaleString()}</div><div class="ps-lbl">Best Month Total</div></div></div><div class="perf-body"><div class="perf-section"><h4>✅ Strengths</h4><ul>${p.strengths.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="perf-section"><h4>⚠️ Development Areas</h4><ul>${p.development.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="perf-section" style="grid-column:1/-1"><h4>🎯 Goals</h4><ul>${p.goals.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div>`}).join('')}</div>`;
}

go('summary');
</script></body></html>
